<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planos da Academia</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .container{
            background:white;
            width:100%;
            max-width:900px;
            padding:30px;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            margin-bottom:25px;
            color:#333;
        }

        table{
            width:100%;
            border-collapse:collapse;
            margin-bottom:20px;
        }

        th{
            background:#4f46e5;
            color:white;
            padding:12px;
        }

        td{
            padding:12px;
            text-align:center;
            border-bottom:1px solid #ddd;
        }

        tr:hover{
            background:#f5f5f5;
        }

        .botoes{
            display:flex;
            justify-content:flex-end;
        }

        .voltar{
            padding:12px 20px;
            border:none;
            border-radius:8px;
            background:#e5e7eb;
            color:#333;
            cursor:pointer;
            font-size:16px;
            font-weight:bold;
        }

        .voltar:hover{
            background:#d1d5db;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🏋️ Planos da Academia</h1>

        <table id="my-table">
            <thead>
                <tr id="table-headers">
                    <th>ID</th>
                    <th>Nome do Plano</th>
                    <th>Valor</th>
                </tr>
            </thead>

            <tbody id="table-body">
                <!-- Os dados serão inseridos pelo plano.js -->
            </tbody>
        </table>

        <div class="botoes">
            <button class="voltar" onclick="history.back()">
                ⬅ Voltar
            </button>
        </div>
    </div>

    <script src="./plano.js"></script>

</body>
</html>
