<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Academia Fit</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f4f4;
}

header{
    background:#111827;
    color:white;
    padding:20px;
    text-align:center;
}

nav{
    background:#2563eb;
    padding:15px;
    text-align:center;
}

nav a{
    color:white;
    text-decoration:none;
    margin:15px;
    font-weight:bold;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:30px;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.1);
    margin-bottom:20px;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:5px;
    cursor:pointer;
}
</style>

</head>
<body>

<header>
    <h1>🏋️ Academia Fit</h1>
    <p>Gerenciamento de Alunos, Planos e Pagamentos</p>
</header>

<div class="container">

    <div class="card">
        <h2>Cadastro de Alunos</h2>
        <p>Cadastre novos alunos e gerencie informações.</p>
        <br>
        <a href="./aluno.html">
            <button>Acessar</button>
        </a>
    </div>

    <div class="card">
        <h2>Planos</h2>
        <p>Visualize e gerencie os planos disponíveis.</p>
        <br>
        <a href="./plano.html">
            <button>Acessar</button>
        </a>
    </div>

    <div class="card">
        <h2>Pagamentos</h2>
        <p>Controle pagamentos e mensalidades dos alunos.</p>
        <br>
        <a href="./pagamento.html">
            <button>Acessar</button>
        </a>
    </div>

</div>

</body>
</html>
